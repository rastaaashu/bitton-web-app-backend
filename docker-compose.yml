version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bitton
      POSTGRES_PASSWORD: bitton_dev
      POSTGRES_DB: bitton_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitton"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
